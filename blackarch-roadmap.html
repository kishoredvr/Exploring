function getPhase(num) {
  return PHASES.find(p => num >= p.start && num <= p.end);
}

// Build phase tabs
const tabsEl = document.getElementById('phaseTabs');
PHASES.forEach(ph => {
  const btn = document.createElement('button');
  btn.className = 'tab';
  btn.dataset.phase = ph.num;
  btn.style.setProperty('--tab-color', ph.color);
  btn.innerHTML = `<span class="dot"></span>Phase ${ph.num}`;
  tabsEl.appendChild(btn);
});

function render(filtered, query) {
  const main = document.getElementById('main');
  const count = document.getElementById('resultsCount');

  if (filtered.length === 0) {
    main.innerHTML = `<div class="no-results"><div class="icon">&#128270;</div><h3>No results found</h3><p>Try a different search term.</p></div>`;
    count.textContent = '0 topics';
    return;
  }

  count.textContent = `${filtered.length.toLocaleString()} topic${filtered.length !== 1 ? 's' : ''}`;

  const byPhase = {};
  PHASES.forEach(ph => byPhase[ph.num] = []);
  filtered.forEach(t => {
    const ph = getPhase(t.num);
    if (ph) byPhase[ph.num].push(t);
  });

  let html = '';
  PHASES.forEach(ph => {
    const list = byPhase[ph.num];
    if (!list.length) return;

    html += `
      <div class="phase-section" id="phase-${ph.num}">
        <div class="phase-header" style="--phase-color:${ph.color}">
          <div class="phase-num-badge">${String(ph.num).padStart(2,'0')}</div>
          <div class="phase-info">
            <div class="phase-title">${ph.title}</div>
            <div class="phase-meta">
              <span class="chip topics-chip">Topics ${ph.start}–${ph.end}</span>
              <span class="chip">${ph.install}</span>
              <span class="chip">${list.length} topics</span>
            </div>
          </div>
          <div class="phase-count">${list.length}</div>
        </div>
        <div class="topic-grid">
    `;

    list.forEach(t => {
      const numStr = String(t.num).padStart(3, '0');
      const hl = (s) => query ? s.replace(new RegExp(`(${query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi'), '<mark style="background:rgba(167,139,250,.2);color:#c4b5fd;border-radius:2px;padding:0 1px">$1</mark>') : s;

      html += `
        <a class="card" href="#" id="topic-${numStr}" style="--card-color:${ph.color}" onclick="return false">
          <div class="card-num">#${numStr}</div>
          <div class="card-body">
            <div class="card-title">${hl(t.title)}</div>
            <div class="card-cmd">${hl(t.cmd)}</div>
            <div class="card-desc">${hl(t.desc)}</div>
          </div>
        </a>
      `;
    });

    html += `</div></div>`;
  });

  main.innerHTML = html;
}

let activePhase = 'all';
let query = '';

function update() {
  let filtered = TOPICS;
  if (activePhase !== 'all') {
    const ph = PHASES.find(p => p.num === parseInt(activePhase));
    if (ph) filtered = filtered.filter(t => t.num >= ph.start && t.num <= ph.end);
  }
  if (query.trim()) {
    const q = query.toLowerCase();
    filtered = filtered.filter(t =>
      t.title.toLowerCase().includes(q) ||
      t.cmd.toLowerCase().includes(q) ||
      t.desc.toLowerCase().includes(q) ||
      String(t.num).padStart(3,'0').includes(q)
    );
  }
  render(filtered, query.trim());
}

document.getElementById('searchInput').addEventListener('input', e => {
  query = e.target.value;
  update();
});

tabsEl.addEventListener('click', e => {
  const btn = e.target.closest('.tab');
  if (!btn) return;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  activePhase = btn.dataset.phase;
  update();
});

update();
</script>
</body>
</html>
